<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b5d55">
  <meta name="description" content="名古屋工業大学周辺の飲食店、食料品店、日用品店などを留学生向けに紹介する生活支援マップです。">
  <title>NITech International Student Life Map</title>
  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/MarkerCluster.css">
  <link rel="stylesheet" href="css/MarkerCluster.Default.css">
  <link rel="stylesheet" href="css/L.Control.Locate.min.css">
  <link rel="stylesheet" href="css/fontawesome-all.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><i class="fas fa-map-marked-alt"></i></div>
        <div>
          <h1 id="appTitle">留学生向け生活支援マップ</h1>
          <p id="appSubtitle">名古屋工業大学周辺の食事・買い物情報</p>
        </div>
      </div>
      <button id="languageToggle" class="language-toggle" type="button" aria-label="Switch language">
        <i class="fas fa-language"></i><span>English</span>
      </button>
    </header>

    <main class="app-main">
      <aside class="sidebar" aria-label="施設検索">
        <div class="search-panel">
          <label class="search-box" for="facilitySearch">
            <i class="fas fa-search" aria-hidden="true"></i>
            <input id="facilitySearch" type="search" autocomplete="off" placeholder="店名・住所で検索">
            <button id="clearSearch" class="clear-search" type="button" aria-label="検索をクリア"><i class="fas fa-times"></i></button>
          </label>

          <div class="category-wrap">
            <div class="section-heading">
              <span id="categoryHeading">カテゴリ</span>
              <button id="resetFilters" type="button" class="text-button">すべて表示</button>
            </div>
            <div id="categoryFilters" class="category-filters" role="group" aria-label="カテゴリ絞り込み"></div>
          </div>

          <div class="result-summary">
            <strong id="resultCount">0</strong><span id="resultUnit">件の施設</span>
            <span id="sortHint">名工大からの徒歩時間順</span>
          </div>
        </div>

        <div id="facilityList" class="facility-list" aria-live="polite"></div>

        <div class="sidebar-note">
          <i class="fas fa-info-circle"></i>
          <span id="dataNotice">営業時間・対応状況は変更される場合があります。利用前に公式情報をご確認ください。</span>
        </div>
      </aside>

      <section class="map-shell" aria-label="地図">
        <div id="map"></div>
        <div class="map-actions">
          <button id="fitAll" class="map-action" type="button"><i class="fas fa-expand-arrows-alt"></i><span id="fitAllLabel">全施設</span></button>
        </div>
        <div class="map-legend" id="mapLegend"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/leaflet.js"></script>
  <script src="js/leaflet.markercluster.js"></script>
  <script src="js/L.Control.Locate.min.js"></script>
  <script src="data/_1.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
